<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HPA Jungle Hub</title>

  <style>
    :root{
      --text:#eef6f1;
      --muted:#a9d1bb;
      --accent:#3bff9a;
      --glass:rgba(0,0,0,.65);
      --border:rgba(255,255,255,.12);
      --shadow:0 40px 120px rgba(0,0,0,.9);
      --radius:20px;
    }

    *{
      box-sizing:border-box;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;
    }

    html, body{
      height:100%;
      margin:0;
      color:var(--text);
      overflow:hidden;
    }

    /* ===============================
       ONE CINEMATIC BACKGROUND
       (THIS IS THE FIX)
    =============================== */
    body{
      background:
        linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.85)),
        url("jungle-bg.jpg") center / cover no-repeat fixed;
    }

    /* vignette */
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,.92));
      pointer-events:none;
    }

    /* Screens */
    .screen{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .screen.active{ display:flex; }

    /* Card */
    .card{
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:34px 30px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      max-width:420px;
      width:100%;
      text-align:center;
    }

    /* Logo */
    .logo{
      width:260px;
      max-width:80%;
      animation:pulse 2.5s ease-in-out infinite;
      transition:opacity .8s ease, transform .8s ease;
    }

    @keyframes pulse{
      0%{ transform:scale(1); }
      50%{ transform:scale(1.08); }
      100%{ transform:scale(1); }
    }

    .logo.fade{
      opacity:0;
      transform:scale(.9);
    }

    .hint{
      margin-top:16px;
      color:var(--muted);
      font-size:14px;
      letter-spacing:.4px;
    }

    /* Inputs */
    input{
      width:100%;
      padding:12px;
      margin-bottom:12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(0,0,0,.45);
      color:var(--text);
    }

    button{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:none;
      background:var(--accent);
      color:#042015;
      font-weight:900;
      cursor:pointer;
    }

    /* Dashboard */
    .dash{
      width:100%;
      max-width:1000px;
    }

    .tiles{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
      margin-top:20px;
    }

    .tile{
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
    }
  </style>
</head>

<body>

<!-- SPLASH -->
<section id="splash" class="screen active">
  <div class="card" id="enter">
    <img src="hpa-logo.png" class="logo" id="logo" alt="HPA Team Logo">
    <div class="hint">Click to enter</div>
  </div>
</section>

<!-- LOGIN -->
<section id="login" class="screen">
  <div class="card">
    <h2>HPA Team Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
  </div>
</section>

<!-- DASHBOARD -->
<section id="dash" class="screen">
  <div class="dash">
    <h2>HPA Jungle Hub</h2>
    <div class="tiles">
      <div class="tile">🌴 Florida Hiring</div>
      <div class="tile">📌 Promos</div>
      <div class="tile">📞 Contacts</div>
      <div class="tile">🧭 Updates</div>
    </div>
  </div>
</section>

<script>
  const splash = document.getElementById("splash");
  const login  = document.getElementById("login");
  const dash   = document.getElementById("dash");
  const logo   = document.getElementById("logo");

  document.getElementById("enter").onclick = () => {
    logo.classList.add("fade");
    setTimeout(() => {
      splash.classList.remove("active");
      login.classList.add("active");
    }, 800);
  };

  document.getElementById("loginBtn").onclick = () => {
    login.classList.remove("active");
    dash.classList.add("active");
  };
</script>

</body>
</html>
